@PART:HAS[@MODULE[ModuleDataTransmitter]]:BEFORE[RealAntennas]
{
    !MODULE[ModuleDataTransmitter],*{}

    %MODULE[ModuleRealAntenna]
    {
        %referenceGain = 1.5
    }
}

@PART:HAS[@MODULE[ModuleConfigurableAntenna],!MODULE[ModuleRealAntenna]]:BEFORE[RealAntennas]
{
    @MODULE[ModuleConfigurableAntenna],*
    {
        @name = ModuleRealAntenna
    }
}

@PART:HAS[@MODULE[ModuleCommand],@MODULE[ModuleDataTransmitter]]:BEFORE[RealAntennas]
{
    !MODULE[ModuleDataTransmitter],*{}

    %MODULE[ModuleRealAntenna]
    {
        %referenceGain = 1.5
    }
}

@PART:HAS[@MODULE[ModuleCommand],!MODULE[ModuleRealAntenna]]:BEFORE[RealAntennas]
{
    %MODULE[ModuleRealAntenna]
    {
        %referenceGain = 1.5
    }
}

@PART:HAS[@MODULE[ModuleRealAntenna]:HAS[~RFBand[]]]:BEFORE[RealAntennas]
{
    @MODULE[ModuleRealAntenna],*
    {
        %RFBand = L
    }
}

@PART:HAS[@MODULE[ModuleRealAntenna]]:FOR[RealAntennas]
{
    @MODULE[ModuleRealAntenna],*
    {
        !antennaType = delete
        %packetInterval = 1
        %packetSize = 1
        %packetResourceCost = 1
        !requiredResource = ElectricCharge
        !antennaPower = delete
        !optimumRange = delete
        !packetFloor = delete
        !packetCeiling = delete

        UPGRADES
        {
            UPGRADE
            {
                name__ = commsTL1
                maxTechLevel = 1
            }
            UPGRADE
            {
                name__ = commsTL2
                maxTechLevel = 2
            }
            UPGRADE
            {
                name__ = commsTL3
                maxTechLevel = 3
            }
            UPGRADE
            {
                name__ = commsTL4
                maxTechLevel = 4
            }
            UPGRADE
            {
                name__ = commsTL5
                maxTechLevel = 5
            }
            UPGRADE
            {
                name__ = commsTL6
                maxTechLevel = 6
            }
            UPGRADE
            {
                name__ = commsTL7
                maxTechLevel = 7
            }
            UPGRADE
            {
                name__ = commsTL8
                maxTechLevel = 8
            }
            UPGRADE
            {
                name__ = commsTL9
                maxTechLevel = 9
            }
        }
    }
}
